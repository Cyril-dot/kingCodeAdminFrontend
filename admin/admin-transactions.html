<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GStake Admin — Transactions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="stylesheet" href="admin-shared.css">
<style>
.type-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.type-icon svg { width: 15px; height: 15px; }
.type-cell { display: flex; align-items: center; gap: .6rem; }
.type-label { font-weight: 600; font-size: .85rem; }
.type-ref { font-size: .7rem; color: var(--t2); font-family: monospace; }

.amount-positive { color: var(--green); font-family: var(--ffC); font-size: 1rem; font-weight: 700; }
.amount-negative { color: var(--red); font-family: var(--ffC); font-size: 1rem; font-weight: 700; }

/* Tabs */
.tabs { display: flex; gap: .4rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
.tab-btn { padding: .5rem 1rem; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--t2); font-size: .83rem; font-weight: 600; cursor: pointer; transition: all .15s; }
.tab-btn.active { background: var(--accentBg); color: var(--accent); border-color: var(--borderAcc); }
.tab-btn:hover:not(.active) { border-color: var(--borderHov); color: var(--t1); }

/* Pagination */
.pagination { display: flex; align-items: center; gap: .4rem; justify-content: center; margin-top: 1.25rem; flex-wrap: wrap; }
.page-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--t2); font-size: .82rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
.page-btn:hover:not(.active) { border-color: var(--borderHov); color: var(--t1); }
.page-info { font-size: .8rem; color: var(--t2); padding: 0 .5rem; }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<nav class="top-nav" id="topNav"></nav>
<aside class="sidebar" id="sidebar"></aside>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<main class="main">
  <div class="page-content">

    <div class="page-header">
      <div>
        <div class="page-title">Transactions</div>
        <div class="page-sub">Monitor all deposits, withdrawals, stakes and winnings.</div>
      </div>
    </div>

    <!-- Summary stats -->
    <div class="stat-grid" style="margin-bottom:1.5rem">
      <div class="stat-card anim-1">
        <div class="stat-icon green"><svg data-lucide="arrow-down-circle"></svg></div>
        <div class="stat-val">GHS 248,760</div>
        <div class="stat-label">Total Deposits</div>
      </div>
      <div class="stat-card anim-2">
        <div class="stat-icon red"><svg data-lucide="arrow-up-circle"></svg></div>
        <div class="stat-val">GHS 98,320</div>
        <div class="stat-label">Total Withdrawals</div>
      </div>
      <div class="stat-card anim-3">
        <div class="stat-icon accent"><svg data-lucide="ticket"></svg></div>
        <div class="stat-val">GHS 186,440</div>
        <div class="stat-label">Total Bet Stakes</div>
      </div>
      <div class="stat-card anim-4">
        <div class="stat-icon blue"><svg data-lucide="trophy"></svg></div>
        <div class="stat-val">GHS 144,330</div>
        <div class="stat-label">Total Winnings Paid</div>
      </div>
    </div>

    <!-- Type filter tabs -->
    <div class="tabs" id="typeTabs">
      <button class="tab-btn active" onclick="filterTx('ALL', this)">All</button>
      <button class="tab-btn" onclick="filterTx('DEPOSIT', this)">Deposits</button>
      <button class="tab-btn" onclick="filterTx('WITHDRAWAL', this)">Withdrawals</button>
      <button class="tab-btn" onclick="filterTx('BET_STAKE', this)">Bet Stakes</button>
      <button class="tab-btn" onclick="filterTx('BET_WINNING', this)">Winnings</button>
      <button class="tab-btn" onclick="filterTx('REFUND', this)">Refunds</button>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="search-wrap">
        <svg data-lucide="search"></svg>
        <input type="text" class="search-input" id="txSearch"
          placeholder="Search reference or user…" oninput="renderTxTable()">
      </div>
      <select class="form-select" id="statusFilter" onchange="renderTxTable()" style="width:auto;min-width:150px">
        <option value="ALL">All Statuses</option>
        <option value="PENDING">Pending</option>
        <option value="SUCCESSFUL">Successful</option>
        <option value="FAILED">Failed</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Type</th>
            <th>User</th>
            <th>Amount</th>
            <th>Balance After</th>
            <th>Status</th>
            <th>Description</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="txBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="txPagination"></div>

  </div>
</main>

<script src="admin-sidebar.js"></script>
<script>
/* ─── Demo transaction data ─── */
const DEMO_TX = [
  { id:'tx1', type:'DEPOSIT', user:'Kwame Asante', email:'kwame.asante@gmail.com', amount:500, balanceAfter:1740.50, status:'SUCCESSFUL', paymentReference:'REF-PSK-001', description:'Paystack deposit', createdAt:'2025-03-31 14:22' },
  { id:'tx2', type:'BET_STAKE', user:'Kwame Asante', email:'kwame.asante@gmail.com', amount:-250, balanceAfter:1490.50, status:'SUCCESSFUL', paymentReference:'BET-8821', description:'Bet slip #BS-8821', createdAt:'2025-03-31 14:30' },
  { id:'tx3', type:'WITHDRAWAL', user:'Ama Owusu', email:'ama.owusu@yahoo.com', amount:-300, balanceAfter:320.00, status:'PENDING', paymentReference:'WD-PSK-002', description:'MTN Mobile Money withdrawal', createdAt:'2025-03-31 13:05' },
  { id:'tx4', type:'BET_WINNING', user:'Kofi Mensah', email:'kofi.m@gmail.com', amount:1200, balanceAfter:1250.00, status:'SUCCESSFUL', paymentReference:'WIN-5532', description:'Bet slip #BS-5532 won', createdAt:'2025-03-30 22:15' },
  { id:'tx5', type:'DEPOSIT', user:'Abena Darko', email:'abena.darko@gmail.com', amount:1000, balanceAfter:1000.00, status:'SUCCESSFUL', paymentReference:'REF-PSK-003', description:'Paystack deposit', createdAt:'2025-03-30 18:40' },
  { id:'tx6', type:'BET_STAKE', user:'Abena Darko', email:'abena.darko@gmail.com', amount:-400, balanceAfter:600.00, status:'SUCCESSFUL', paymentReference:'BET-6610', description:'Bet slip #BS-6610', createdAt:'2025-03-30 19:00' },
  { id:'tx7', type:'REFUND', user:'Yaw Boateng', email:'yaw.b@gmail.com', amount:150, balanceAfter:830.00, status:'SUCCESSFUL', paymentReference:'REF-VOID-009', description:'Void refund for cancelled game', createdAt:'2025-03-29 11:30' },
  { id:'tx8', type:'WITHDRAWAL', user:'Nana Osei', email:'nana.osei@gmail.com', amount:-800, balanceAfter:1300.00, status:'FAILED', paymentReference:'WD-PSK-004', description:'Bank transfer failed', createdAt:'2025-03-29 09:15' },
  { id:'tx9', type:'DEPOSIT', user:'Akua Frimpong', email:'akua.f@yahoo.com', amount:600, balanceAfter:600.00, status:'SUCCESSFUL', paymentReference:'REF-PSK-005', description:'Paystack deposit', createdAt:'2025-03-28 16:55' },
  { id:'tx10', type:'BET_STAKE', user:'Nana Osei', email:'nana.osei@gmail.com', amount:-500, balanceAfter:2100.00, status:'SUCCESSFUL', paymentReference:'BET-9900', description:'Bet slip #BS-9900', createdAt:'2025-03-28 20:10' },
];

const TYPE_ICON = { DEPOSIT:'arrow-down-circle', WITHDRAWAL:'arrow-up-circle', BET_STAKE:'ticket', BET_WINNING:'trophy', REFUND:'rotate-ccw' };
const TYPE_COLOR = { DEPOSIT:'var(--green)', WITHDRAWAL:'var(--red)', BET_STAKE:'var(--accent)', BET_WINNING:'var(--blue)', REFUND:'var(--orange)' };
const TYPE_BG = { DEPOSIT:'var(--greenBg)', WITHDRAWAL:'var(--redBg)', BET_STAKE:'var(--accentBg)', BET_WINNING:'var(--blueBg)', REFUND:'var(--orangeBg)' };

let currentType = 'ALL';
let TX_PAGE = 1;
const TX_PER_PAGE = 6;

window.addEventListener('load', () => {
  requireAuth();
  injectAdminShell('admin-transactions.html');

  /* Check if filtering by userId from URL param */
  const params = new URLSearchParams(window.location.search);
  const userId = params.get('userId');
  if(userId) document.getElementById('txSearch').value = userId;

  renderTxTable();
});

function filterTx(type, btn){
  currentType = type;
  TX_PAGE = 1;
  document.querySelectorAll('#typeTabs .tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTxTable();
}

function getFilteredTx(){
  const search = document.getElementById('txSearch').value.toLowerCase();
  const statusFilter = document.getElementById('statusFilter').value;
  return DEMO_TX.filter(tx => {
    if(currentType !== 'ALL' && tx.type !== currentType) return false;
    if(statusFilter !== 'ALL' && tx.status !== statusFilter) return false;
    if(search && !`${tx.user} ${tx.email} ${tx.paymentReference}`.toLowerCase().includes(search)) return false;
    return true;
  });
}

function renderTxTable(){
  /*
   * INTEGRATION — GET ALL TRANSACTIONS (paginated, filterable):
   * GET /api/v1/admin/transactions?page={TX_PAGE-1}&size={TX_PER_PAGE}&type={currentType}&status={statusFilter}
   * Headers: Authorization: Bearer <token>
   * Response: Page<TransactionResponse> {
   *   content: [ { id, type, status, amount, balanceAfter, paymentReference, description, createdAt } ],
   *   totalElements, totalPages
   * }
   *
   * For user-specific:
   * GET /api/v1/admin/users/{userId}/transactions?page=0&size=20
   */
  const filtered = getFilteredTx();
  const total = filtered.length;
  const totalPages = Math.ceil(total / TX_PER_PAGE) || 1;
  if(TX_PAGE > totalPages) TX_PAGE = 1;
  const page = filtered.slice((TX_PAGE-1)*TX_PER_PAGE, TX_PAGE*TX_PER_PAGE);

  const tbody = document.getElementById('txBody');
  if(!page.length){
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--t2)">No transactions found.</td></tr>`;
    document.getElementById('txPagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = page.map(tx => {
    const isPos = tx.amount > 0;
    const statusClass = { SUCCESSFUL:'success', PENDING:'pending', FAILED:'failed' }[tx.status] || 'pending';
    return `<tr>
      <td>
        <div class="type-cell">
          <div class="type-icon" style="background:${TYPE_BG[tx.type]}">
            <svg data-lucide="${TYPE_ICON[tx.type]}" style="color:${TYPE_COLOR[tx.type]}"></svg>
          </div>
          <div>
            <div class="type-label">${tx.type.replace('_',' ')}</div>
            <div class="type-ref">${tx.paymentReference}</div>
          </div>
        </div>
      </td>
      <td>
        <div style="font-weight:600;font-size:.85rem">${tx.user}</div>
        <div style="font-size:.72rem;color:var(--t2)">${tx.email}</div>
      </td>
      <td class="${isPos?'amount-positive':'amount-negative'}">${isPos?'+':''}GHS ${Math.abs(tx.amount).toLocaleString()}</td>
      <td style="font-family:var(--ffC);font-size:.95rem;font-weight:600">GHS ${tx.balanceAfter.toFixed(2)}</td>
      <td><span class="badge badge-${statusClass}">${tx.status}</span></td>
      <td class="td-muted" style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${tx.description}</td>
      <td class="td-muted">${tx.createdAt}</td>
    </tr>`;
  }).join('');

  /* Pagination */
  let pages = '';
  for(let i=1;i<=Math.min(totalPages,5);i++){
    pages += `<button class="page-btn${i===TX_PAGE?' active':''}" onclick="goTxPage(${i})">${i}</button>`;
  }
  document.getElementById('txPagination').innerHTML =
    `<button class="page-btn" onclick="goTxPage(${TX_PAGE-1})" ${TX_PAGE<=1?'disabled':''}>←</button>
     ${pages}
     <span class="page-info">${total} records</span>
     <button class="page-btn" onclick="goTxPage(${TX_PAGE+1})" ${TX_PAGE>=totalPages?'disabled':''}>→</button>`;

  lucide.createIcons();
}

function goTxPage(p){
  const totalPages = Math.ceil(getFilteredTx().length / TX_PER_PAGE) || 1;
  if(p < 1 || p > totalPages) return;
  TX_PAGE = p;
  renderTxTable();
}
</script>
</body>
</html>
